apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-python-repo-foundation
  title: New Python Repository Foundation
  description: Creates a new GitHub repository for Python projects with TechDocs, engineering governance, and repo standards files.
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Component details
      required:
        - name
        - description
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the component (used as the repo and catalog entry name)
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: A short description of this repository
        owner:
          title: Owner
          type: string
          description: Owner of the component
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        codeowners:
          title: Code Owners
          type: string
          description: "GitHub CODEOWNERS entry (e.g. @org/team-name or @username)"
          default: "@org/team-name"
        pythonVersion:
          title: Python Version
          type: string
          description: Python version for the project
          default: "3.12"
          enum:
            - "3.10"
            - "3.11"
            - "3.12"
            - "3.13"
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - Oz-hubs

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          codeowners: ${{ parameters.codeowners }}
          pythonVersion: ${{ parameters.pythonVersion }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: Repository created
        info: "${{ parameters.name }} has been created and registered in the catalog."
        severity: normal

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
